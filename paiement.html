<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paiement (démo) — Campagne Charles-Éric</title>
<link rel="stylesheet" href="styles/campaign.css">
<style>
  :root{ --coral:#FF5252; --coral-600:#F03A3A; --navy:#1A2C4D; --ink:#1a1f36; --muted:#697386; --line:#e6e6e6; }
  body{margin:0;background:#f6f9fc;color:var(--ink);font-family:var(--body),-apple-system,system-ui,sans-serif;min-height:100vh;}

  .demo-banner{background:#1A2C4D;color:#fff;text-align:center;font-family:var(--body);font-size:13px;font-weight:600;
    padding:9px 16px;letter-spacing:0.02em;}
  .demo-banner b{color:#FFD66B;}

  .checkout{max-width:940px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 38px);}
  @media(max-width:820px){.checkout{grid-template-columns:1fr;min-height:auto;}}

  /* left: order summary */
  .side{background:#fff;border-right:1px solid var(--line);padding:48px 48px 40px;}
  @media(max-width:820px){.side{border-right:0;border-bottom:1px solid var(--line);padding:32px 28px;}}
  .side .merchant{display:flex;align-items:center;gap:10px;margin-bottom:34px;}
  .side .merchant img{height:26px;}
  .side .merchant span{font-family:var(--body);font-weight:600;font-size:14px;color:var(--muted);}
  .side .amount-lbl{font-family:var(--body);font-size:15px;color:var(--muted);margin-bottom:4px;}
  .side .amount{font-family:var(--display),sans-serif;font-weight:800;font-size:40px;letter-spacing:-0.02em;color:var(--ink);margin-bottom:30px;}
  .side .lines{border-top:1px solid var(--line);}
  .side .li{display:flex;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .side .li .nm{color:var(--ink);} .side .li .nm small{display:block;color:var(--muted);font-size:12px;margin-top:2px;}
  .side .li .pr{color:var(--ink);font-weight:600;white-space:nowrap;}
  .side .li.disc .pr{color:var(--coral-600);}
  .side .li.tot{font-weight:700;font-size:16px;border-bottom:0;padding-top:16px;}
  .side .li.tot .pr{font-size:16px;}

  /* right: payment form */
  .pay{background:#fff;padding:48px 48px 40px;}
  @media(max-width:820px){.pay{padding:32px 28px 40px;}}
  .pay h1{font-family:var(--display),sans-serif;font-weight:700;font-size:21px;margin:0 0 22px;color:var(--ink);}
  .warn{background:#FFF4E5;border:1px solid #FFD8A8;color:#8a5a00;border-radius:8px;padding:11px 14px;font-size:12.5px;line-height:1.45;margin-bottom:22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
  .input{width:100%;box-sizing:border-box;border:1px solid #d9dce1;border-radius:8px;padding:12px 14px;font-size:15px;color:var(--ink);
    font-family:var(--body),sans-serif;background:#fff;transition:border-color .15s,box-shadow .15s;}
  .input:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 3px rgba(255,82,82,.15);}
  .card-group{border:1px solid #d9dce1;border-radius:8px;overflow:hidden;}
  .card-group .input{border:0;border-radius:0;}
  .card-group .row2{display:flex;border-top:1px solid #d9dce1;}
  .card-group .row2 .input{width:50%;}
  .card-group .row2 .input:first-child{border-right:1px solid #d9dce1;}
  .pay .pay-btn{width:100%;margin-top:10px;background:var(--coral);color:#fff;border:0;border-radius:8px;cursor:pointer;
    padding:14px 16px;font-family:var(--body),sans-serif;font-weight:700;font-size:16px;transition:background .2s;}
  .pay .pay-btn:hover{background:var(--coral-600);}
  .pay .secured{margin-top:16px;text-align:center;font-size:12px;color:var(--muted);}
  .pay .secured b{color:#635bff;}

  /* success */
  .success{display:none;max-width:560px;margin:0 auto;padding:64px 28px 80px;text-align:center;}
  .success .check{width:84px;height:84px;border-radius:50%;background:#e3f9ee;display:flex;align-items:center;justify-content:center;margin:0 auto 26px;}
  .success .check svg{width:44px;height:44px;color:#1aae6f;}
  .success h2{font-family:var(--display),sans-serif;font-weight:800;font-size:30px;letter-spacing:-0.02em;margin:0 0 8px;color:var(--ink);}
  .success .paid{font-size:16px;color:var(--muted);margin:0 0 26px;}
  .success .fictif{background:#FFF4E5;border:1px solid #FFD8A8;color:#8a5a00;border-radius:12px;padding:18px 20px;font-size:15px;line-height:1.55;text-align:left;margin-bottom:28px;}
  .success .fictif b{color:#7a4e00;}
  .success .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .success .btn{font-family:var(--body),sans-serif;font-weight:700;font-size:14px;text-decoration:none;border:0;cursor:pointer;
    padding:13px 22px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;}
  .success .btn.primary{background:var(--coral);color:#fff;}
  .success .btn.primary:hover{background:var(--coral-600);}
  .success .btn.ghost{background:#fff;color:var(--ink);border:1px solid #d9dce1;}

  .empty{max-width:520px;margin:0 auto;padding:80px 28px;text-align:center;}
  .empty h2{font-family:var(--display),sans-serif;font-weight:800;font-size:24px;margin:0 0 12px;}
  .empty p{color:var(--muted);margin:0 0 22px;}
  .empty a{font-family:var(--body),sans-serif;font-weight:700;text-decoration:none;background:var(--coral);color:#fff;padding:13px 22px;border-radius:999px;}
</style>
</head>
<body>
<div class="demo-banner">MODE DÉMO · <b>Paiement fictif</b> · n'entrez aucune vraie information bancaire</div>

<div id="root"></div>

<script src="scripts/cart.js"></script>
<script>
(function () {
  var PROMO_CODE = 'OVPSFAPLT50', PROMO_RATE = 0.5, PROMO_KEY = 'bump_promo';
  function eur(n){ var v = Number.isInteger(n) ? String(n) : n.toFixed(2); return v.replace('.', ',') + ' €'; }

  var root = document.getElementById('root');
  var items = BumpCart.read();

  if (!items.length) {
    root.innerHTML =
      '<div class="empty"><h2>Votre panier est vide.</h2>' +
      '<p>Ajoutez des articles avant de passer au paiement.</p>' +
      '<a href="Produits dérivés Bump.html">Voir la boutique</a></div>';
    return;
  }

  var subtotal = BumpCart.total();
  var applied = localStorage.getItem(PROMO_KEY) === '1';
  var discount = applied ? subtotal * PROMO_RATE : 0;
  var grand = subtotal - discount;

  var lines = items.map(function (it) {
    return '<div class="li"><div class="nm">' + it.name + '<small>Quantité : ' + it.qty + '</small></div>' +
      '<div class="pr">' + eur(it.price * it.qty) + '</div></div>';
  }).join('');
  if (applied) {
    lines += '<div class="li disc"><div class="nm">Code ' + PROMO_CODE + '<small>Réduction -50 %</small></div>' +
      '<div class="pr">-' + eur(discount) + '</div></div>';
  }
  lines += '<div class="li tot"><div class="nm">Total</div><div class="pr">' + eur(grand) + '</div></div>';

  root.innerHTML =
    '<div class="checkout" id="checkout">' +
      '<div class="side">' +
        '<div class="merchant"><img src="assets/logo-bump-white.png" alt="" style="filter:none;height:24px;background:#1A2C4D;border-radius:6px;padding:6px 8px;"><span>Campagne Charles-Éric · Bump Awards</span></div>' +
        '<div class="amount-lbl">Montant à régler</div>' +
        '<div class="amount">' + eur(grand) + '</div>' +
        '<div class="lines">' + lines + '</div>' +
      '</div>' +
      '<div class="pay">' +
        '<h1>Payer par carte</h1>' +
        '<div class="warn">Ceci est une <b>page de démonstration</b>. Les champs sont pré-remplis avec une carte de test. N\'entrez jamais un vrai numéro de carte : aucune donnée n\'est envoyée ni traitée.</div>' +
        '<form id="payform">' +
          '<div class="field"><label>E-mail</label><input class="input" type="email" id="email" value="electeur@exemple.com"></div>' +
          '<div class="field"><label>Informations de carte</label>' +
            '<div class="card-group">' +
              '<input class="input" id="cardnum" value="4242 4242 4242 4242" inputmode="numeric">' +
              '<div class="row2"><input class="input" id="exp" value="12 / 34"><input class="input" id="cvc" value="123"></div>' +
            '</div>' +
          '</div>' +
          '<div class="field"><label>Nom sur la carte</label><input class="input" id="cardname" placeholder="Charles-Éric pour les intimes"></div>' +
          '<div class="field"><label>Pays</label><select class="input" id="country"><option>France</option><option>Belgique</option><option>Suisse</option><option>Luxembourg</option></select></div>' +
          '<button type="submit" class="pay-btn">Payer ' + eur(grand) + '</button>' +
        '</form>' +
        '<div class="secured">Paiement (fictif) sécurisé · propulsé par <b>une démo, pas Stripe</b></div>' +
      '</div>' +
    '</div>' +
    '<div class="success" id="success">' +
      '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>' +
      '<h2>Merci pour votre commande !</h2>' +
      '<div class="paid">Paiement de <b>' + eur(grand) + '</b> validé.</div>' +
      '<div class="fictif">Il s\'agit bien évidemment d\'une <b>commande fictive</b> : aucune carte n\'a été traitée et aucun montant n\'a été débité. C\'est une démonstration de campagne, Surtout Serious mais pas dupe.</div>' +
      '<div class="actions">' +
        '<a class="btn primary" href="index.html">Retour à la campagne</a>' +
        '<a class="btn ghost" href="Produits dérivés Bump.html">Revenir à la boutique</a>' +
      '</div>' +
    '</div>';

  document.getElementById('payform').addEventListener('submit', function (e) {
    e.preventDefault();
    // commande fictive : on vide le panier et le code promo, puis écran de remerciement
    BumpCart.clear();
    localStorage.removeItem(PROMO_KEY);
    document.getElementById('checkout').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
</body>
</html>
