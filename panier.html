<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon panier — Charles-Éric · Surtout Serious</title>
<link rel="stylesheet" href="styles/campaign.css">
<style>
  body{background:#0f1f3a;color:#fff;
    background:radial-gradient(120% 70% at 85% -5%, rgba(255,82,82,0.14) 0%, rgba(255,82,82,0) 50%),linear-gradient(170deg,#16335f 0%,#10203c 60%,#0e1b33 100%);
    min-height:100vh;}
  .wrap{max-width:1280px;margin:0 auto;padding:72px 48px 96px;}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:14px;}
  header.top .brand{display:inline-flex;}
  header.top img.logo{height:44px;display:block;}
  header.top .nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  header.top .nav a{font-family:var(--body);font-weight:600;font-size:15px;color:#c3cfe8;text-decoration:none;padding:9px 17px;border-radius:999px;display:inline-flex;align-items:center;transition:background .2s cubic-bezier(.4,0,.2,1),color .2s cubic-bezier(.4,0,.2,1);}
  header.top .nav a:hover{color:#fff;background:rgba(255,255,255,0.07);}
  header.top .nav a.active{color:#fff;background:rgba(255,82,82,0.16);box-shadow:inset 0 0 0 1px rgba(255,82,82,0.45);}
  header.top .nav .nav-meta{font-family:var(--body);font-weight:600;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#7d90b8;margin-left:10px;}
  @media(max-width:600px){header.top .nav .nav-meta{display:none;}}

  .hero{margin:40px 0 40px;border-top:1px solid rgba(255,255,255,0.12);padding-top:40px;}
  .hero .kick{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .hero .kick img{height:24px;display:block;}
  .hero .kick span{font-family:var(--body);font-weight:700;font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:var(--coral);}
  .hero h1{margin:0;font-family:var(--display);font-weight:900;letter-spacing:-0.035em;line-height:0.94;font-size:72px;}
  .hero h1 .s{color:var(--coral);}

  .cartlist{display:flex;flex-direction:column;gap:14px;}
  .row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:22px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:18px;padding:20px 24px;}
  .row .meta .nm{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-0.01em;}
  .row .meta .unit{font-family:var(--body);font-size:13px;color:#8aa0cc;margin-top:3px;}
  .row .qty{display:inline-flex;align-items:center;gap:6px;}
  .row .qty .step{width:34px;height:34px;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;
    font-family:var(--display);font-weight:800;font-size:18px;line-height:1;cursor:pointer;transition:border-color .2s,background .2s;}
  .row .qty .step:hover{border-color:rgba(255,82,82,0.6);background:rgba(255,82,82,0.12);}
  .row .qty .q{min-width:26px;text-align:center;font-family:var(--display);font-weight:700;font-size:17px;}
  .row .line{font-family:var(--display);font-weight:800;font-size:19px;min-width:80px;text-align:right;}
  .row .rm{width:34px;height:34px;border-radius:999px;border:0;background:rgba(255,255,255,0.06);color:#9fb2da;
    font-size:20px;line-height:1;cursor:pointer;transition:background .2s,color .2s;}
  .row .rm:hover{background:rgba(255,82,82,0.18);color:#fff;}

  .summary{margin-top:26px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
    background:linear-gradient(158deg,#1D2939 0%,#2C405A 100%);border-radius:20px;padding:26px 28px;}
  .summary .tot{font-family:var(--body);font-size:17px;color:#c3cfe8;}
  .summary .tot b{font-family:var(--display);font-weight:900;font-size:30px;letter-spacing:-0.02em;color:#fff;margin-left:10px;}
  .summary .sumacts{display:flex;gap:12px;flex-wrap:wrap;}
  .summary .tots{display:flex;flex-direction:column;gap:4px;}
  .summary .line-sub{font-family:var(--body);font-size:14px;color:#9fb2da;}
  .summary .line-sub span{color:#c3cfe8;font-weight:600;margin-left:6px;}
  .summary .line-disc{font-family:var(--body);font-size:14px;font-weight:700;color:#ff9a9a;}
  .summary .line-disc span{margin-left:6px;}

  .promo{margin-top:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:16px;padding:18px 20px;}
  .promo .promo-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .promo .promo-form input{flex:1;min-width:180px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);
    border-radius:999px;padding:12px 18px;color:#fff;font-family:var(--body);font-size:15px;letter-spacing:0.04em;text-transform:uppercase;}
  .promo .promo-form input::placeholder{color:#7d90b8;letter-spacing:0;text-transform:none;}
  .promo .promo-form input:focus{outline:none;border-color:rgba(255,82,82,0.6);}
  .promo .promo-err{display:none;margin-top:10px;font-family:var(--body);font-size:13px;color:#FF8A8A;}
  .promo .promo-on{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:var(--body);font-size:15px;color:#dbe3f3;}
  .promo .promo-on .pct{display:inline-block;margin-left:8px;background:var(--coral);color:#fff;font-weight:700;font-size:12px;
    padding:3px 10px;border-radius:999px;vertical-align:middle;}
  .promo .linkbtn{background:transparent;border:0;cursor:pointer;color:#9fb2da;font-family:var(--body);font-weight:600;font-size:14px;text-decoration:underline;}
  .promo .linkbtn:hover{color:#fff;}
  .btn{font-family:var(--body);font-weight:700;font-size:14px;text-decoration:none;border:0;cursor:pointer;
    padding:13px 22px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;
    transition:background .2s cubic-bezier(.4,0,.2,1),border-color .2s cubic-bezier(.4,0,.2,1),color .2s cubic-bezier(.4,0,.2,1);}
  .btn.primary{background:var(--coral);color:#fff;box-shadow:0 8px 22px rgba(255,82,82,0.3);}
  .btn.primary:hover{background:var(--coral-deep);}
  .btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.25);}
  .btn.ghost:hover{border-color:rgba(255,82,82,0.6);}

  .note{margin-top:16px;font-family:var(--body);font-size:13px;color:#8aa0cc;}
  .ordered{margin-top:18px;background:rgba(255,82,82,0.12);box-shadow:inset 0 0 0 1px rgba(255,82,82,0.4);
    border-radius:16px;padding:18px 22px;font-family:var(--body);font-size:15px;color:#fff;}

  .empty{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:22px;padding:64px 40px;text-align:center;}
  .empty .eb{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-0.02em;margin-bottom:10px;}
  .empty p{font-family:var(--body);font-size:16px;color:#a9b8d8;margin:0 0 24px;}

  footer{margin-top:60px;border-top:1px solid rgba(255,255,255,0.12);padding-top:28px;
    font-family:var(--body);font-size:14px;color:#8aa0cc;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;}

  @media(max-width:700px){
    .wrap{padding:48px 24px 72px;}
    .hero h1{font-size:52px;}
    .row{grid-template-columns:1fr auto;grid-template-areas:"meta rm" "qty line";row-gap:14px;}
    .row .meta{grid-area:meta;} .row .rm{grid-area:rm;justify-self:end;}
    .row .qty{grid-area:qty;} .row .line{grid-area:line;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="brand" href="index.html"><img class="logo" src="assets/logo-bump-white.png" alt="bump"></a>
    <nav class="nav">
      <a href="index.html">Le kit</a>
      <a href="soutiens.html">Mes soutiens</a>
      <a href="Produits dérivés Bump.html">Boutique</a>
      <a href="quiz.html">Quiz</a>
      <a href="panier.html" class="active">Panier <span class="cart-count">0</span></a>
      <span class="nav-meta">Award Fun&nbsp;&amp;&nbsp;Serious · 2026</span>
    </nav>
  </header>

  <section class="hero">
    <div class="kick"><img src="assets/bolt-coral.png" alt=""><span>Boutique de campagne</span></div>
    <h1>Mon <span class="s">panier.</span></h1>
  </section>

  <div id="cart-root"></div>

  <footer>
    <span>Charles-Éric · Le mandat numéro quatre · Award Fun&nbsp;&amp;&nbsp;Serious 2026</span>
    <span>Palette : Coral #FF5252 · Navy #153879 / #1E2A3A</span>
  </footer>
</div>

<script src="scripts/cart.js"></script>
<script>
  function eur(n){ var v = Number.isInteger(n) ? String(n) : n.toFixed(2); return v.replace('.', ',') + ' €'; }

  var PROMO_CODE = 'OVPSFAPLT50', PROMO_RATE = 0.5, PROMO_KEY = 'bump_promo';
  function promoApplied(){ return localStorage.getItem(PROMO_KEY) === '1'; }

  window.renderCart = function () {
    var root = document.getElementById('cart-root');
    var items = BumpCart.read();

    if (!items.length) {
      root.innerHTML =
        '<div class="empty">' +
          '<div class="eb">Votre panier est vide.</div>' +
          '<p>Ajoutez un t-shirt, un hoodie, une casquette ou un tapis depuis la boutique.</p>' +
          '<a class="btn primary" href="Produits dérivés Bump.html">Voir la boutique</a>' +
        '</div>';
      return;
    }

    var rows = items.map(function (it) {
      return '<div class="row" data-id="' + it.id + '">' +
        '<div class="meta"><div class="nm">' + it.name + '</div><div class="unit">' + eur(it.price) + " l'unité" + '</div></div>' +
        '<div class="qty"><button class="step" data-act="dec" aria-label="Moins">-</button>' +
        '<span class="q">' + it.qty + '</span>' +
        '<button class="step" data-act="inc" aria-label="Plus">+</button></div>' +
        '<div class="line">' + eur(it.price * it.qty) + '</div>' +
        '<button class="rm" data-act="rm" aria-label="Retirer l\'article">×</button>' +
      '</div>';
    }).join('');

    var subtotal = BumpCart.total();
    var applied = promoApplied();
    var discount = applied ? subtotal * PROMO_RATE : 0;
    var grand = subtotal - discount;

    var promoBlock = applied
      ? '<div class="promo"><div class="promo-on"><span>Code <b>' + PROMO_CODE + '</b> appliqué<span class="pct">-50 %</span></span>' +
          '<button class="linkbtn" id="promoRemove">Retirer</button></div></div>'
      : '<div class="promo"><div class="promo-form">' +
          '<input id="promoInput" type="text" placeholder="Code promo" autocomplete="off" spellcheck="false">' +
          '<button class="btn ghost" id="promoApply">Appliquer</button>' +
        '</div><div class="promo-err" id="promoErr">Code invalide. Réessayez.</div></div>';

    root.innerHTML =
      '<div class="cartlist">' + rows + '</div>' +
      promoBlock +
      '<div class="summary">' +
        '<div class="tots">' +
          '<div class="line-sub">Sous-total <span>' + eur(subtotal) + '</span></div>' +
          (applied ? '<div class="line-disc">Réduction (-50 %) <span>-' + eur(discount) + '</span></div>' : '') +
          '<div class="tot">Total<b>' + eur(grand) + '</b></div>' +
        '</div>' +
        '<div class="sumacts">' +
          '<button class="btn ghost" id="clearBtn">Vider le panier</button>' +
          '<a class="btn ghost" href="Produits dérivés Bump.html">Continuer mes achats</a>' +
          '<button class="btn primary" id="orderBtn">Passer commande</button>' +
        '</div>' +
      '</div>' +
      '<div class="ordered" id="orderMsg" style="display:none">Merci, votre commande de campagne est notée. Surtout Serious : un membre de l\'équipe vous recontacte. (Boutique concept, paiement non connecté.)</div>' +
      '<p class="note">Boutique concept : le paiement n\'est pas connecté, la commande n\'est pas réellement enregistrée.</p>';

    [].forEach.call(root.querySelectorAll('.row'), function (r) {
      var id = r.getAttribute('data-id');
      function cur() { return BumpCart.read().filter(function (x) { return x.id === id; })[0]; }
      r.querySelector('[data-act=inc]').onclick = function () { var it = cur(); if (it) BumpCart.setQty(id, it.qty + 1); renderCart(); };
      r.querySelector('[data-act=dec]').onclick = function () { var it = cur(); if (it) BumpCart.setQty(id, it.qty - 1); renderCart(); };
      r.querySelector('[data-act=rm]').onclick = function () { BumpCart.remove(id); renderCart(); };
    });
    document.getElementById('clearBtn').onclick = function () { BumpCart.clear(); localStorage.removeItem(PROMO_KEY); renderCart(); };
    document.getElementById('orderBtn').onclick = function () { document.getElementById('orderMsg').style.display = 'block'; };

    if (applied) {
      document.getElementById('promoRemove').onclick = function () { localStorage.removeItem(PROMO_KEY); renderCart(); };
    } else {
      var input = document.getElementById('promoInput');
      var err = document.getElementById('promoErr');
      function tryApply() {
        var v = (input.value || '').trim().toUpperCase().replace(/\s+/g, '');
        if (v === PROMO_CODE) { localStorage.setItem(PROMO_KEY, '1'); renderCart(); }
        else { err.style.display = 'block'; input.focus(); }
      }
      document.getElementById('promoApply').onclick = tryApply;
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); tryApply(); } });
    }
  };
</script>
<script src="scripts/countdown.js"></script>
</body>
</html>
