<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Badge — Pas les trompettistes</title>
<link rel="stylesheet" href="../styles/campaign.css">
<style>
  html,body{background:transparent;}
  .badge{width:1024px;height:1024px;}
  .disc{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(72% 72% at 50% 34%, #FF6363 0%, #FF5252 42%, #F03A3A 100%);
    border:30px solid var(--navy);
    box-shadow:0 24px 60px rgba(8,18,40,0.4);}
  .ring2{position:absolute;inset:64px;border-radius:50%;border:4px solid rgba(14,36,78,0.4);}
  .arcs{position:absolute;inset:0;}
  .arcs .top{font-family:var(--display);font-weight:800;fill:#fff;font-size:60px;letter-spacing:0.01em;}
  .arcs .bot{font-family:var(--display);font-weight:800;fill:#fff;font-size:56px;letter-spacing:0.02em;text-transform:uppercase;}

  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .center .bolt{width:142px;margin-bottom:22px;}
  .center .bolt img{width:100%;display:block;filter:drop-shadow(0 12px 22px rgba(8,18,40,0.3));}
  .center .name{font-family:var(--display);font-weight:900;letter-spacing:-0.03em;color:#fff;font-size:96px;line-height:0.88;}
  .center .tag{margin-top:24px;font-family:var(--body);font-weight:700;font-size:33px;letter-spacing:0.13em;text-transform:uppercase;color:#0E244E;}
  .center .pill{margin-top:30px;font-family:var(--display);font-weight:900;font-size:46px;color:#fff;
    border:4px solid #fff;border-radius:999px;padding:8px 40px;}
</style>
</head>
<body>
<div class="artboard badge" data-screen-label="Badge trompettistes">
  <div class="disc"></div>
  <div class="ring2"></div>

  <svg class="arcs" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
      <path id="topArc" d="M 512,512 m -376,0 a 376,376 0 1,1 752,0"></path>
      <path id="botArc" d="M 158,512 A 354,354 0 0,0 866,512"></path>
    </defs>
    <text class="top"><textPath href="#topArc" startOffset="50%" text-anchor="middle">On va pas se faire avoir</textPath></text>
    <text class="bot"><textPath href="#botArc" startOffset="50%" text-anchor="middle">Par les trompettistes !</textPath></text>
  </svg>

  <div class="center">
    <div class="bolt"><img src="../assets/bolt-navy.png" alt=""></div>
    <div class="name">Charles-Éric</div>
    <div class="tag">Surtout Serious</div>
    <div class="pill">N°4</div>
  </div>
</div>
</body>
</html>
