<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Bannière LinkedIn — Surtout Serious</title>
<link rel="stylesheet" href="../styles/campaign.css">
<style>
  html,body{background:#11203a;}
  .banner{width:1584px;height:396px;color:var(--white);overflow:hidden;
    background:
      radial-gradient(70% 130% at 86% 20%, rgba(255,82,82,0.20) 0%, rgba(255,82,82,0) 52%),
      linear-gradient(140deg,#173B7E 0%,#15326A 50%,#16263F 100%);}
  /* coral sash right */
  .banner .sash{position:absolute;top:0;bottom:0;right:0;width:520px;
    background:linear-gradient(180deg,#FF5252 0%,#F03A3A 100%);
    clip-path:polygon(150px 0,100% 0,100% 100%,0 100%);}
  .banner .wm{position:absolute;top:-40px;left:250px;width:330px;opacity:0.06;transform:rotate(-8deg);}
  .banner .wm img{width:100%;display:block;}

  .banner .logo{position:absolute;top:58px;left:372px;height:40px;}
  .banner .copy{position:absolute;left:372px;top:138px;}
  .banner h1{margin:0;font-family:var(--display);font-weight:900;letter-spacing:-0.035em;line-height:1;font-size:80px;white-space:nowrap;}
  .banner h1 .s{color:var(--coral);}
  .banner .sub{margin-top:26px;display:flex;align-items:center;gap:14px;font-family:var(--body);font-weight:600;font-size:25px;letter-spacing:0.02em;color:#bcccea;white-space:nowrap;}
  .banner .sub .pill{color:var(--coral);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
  .banner .sub img{height:28px;display:block;}

  .banner .portrait{position:absolute;right:-30px;bottom:0;width:560px;
    filter:drop-shadow(0 18px 34px rgba(8,18,40,0.4));}
  .banner .portrait img{width:100%;display:block;}

  /* keep bottom-left corner clear for the round profile photo */
  .banner .safe{position:absolute;left:0;bottom:0;width:300px;height:200px;}
</style>
</head>
<body>
<div class="artboard banner" data-screen-label="Bannière LinkedIn">
  <div class="sash"></div>
  <div class="wm"><img src="../assets/bolt-white.png" alt=""></div>
  <img class="logo" src="../assets/logo-bump-white.png" alt="bump">

  <div class="copy">
    <h1 class="slogan">Surtout <span class="s">Serious.</span></h1>
    <div class="sub">
      <img src="../assets/bolt-coral.png" alt="">
      <span class="pill">Le mandat numéro quatre</span>
      <span>· Charles-Éric · N°4</span>
    </div>
  </div>

  <div class="portrait"><img src="../assets/portrait-cutout.png" alt="Charles-Éric"></div>
</div>
</body>
</html>
