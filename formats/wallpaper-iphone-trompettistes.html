<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Wallpaper iPhone — Les trompettistes</title>
<link rel="stylesheet" href="../styles/campaign.css">
<style>
  html,body{background:#11203a;}
  .wall{
    width:1290px;height:2796px;color:var(--white);overflow:hidden;
    background:
      radial-gradient(78% 46% at 50% 34%, rgba(255,82,82,0.20) 0%, rgba(255,82,82,0) 56%),
      linear-gradient(168deg, #173B7E 0%, #15326A 48%, #14223A 100%);
  }
  /* faint giant bolt watermark, lower-centre */
  .wall .wm{position:absolute;left:50%;top:1700px;transform:translateX(-50%) rotate(-7deg);width:920px;opacity:0.05;}
  .wall .wm img{width:100%;display:block;}

  /* safe top zone (clock) ends ~470; safe bottom (icons) starts ~2360 */
  .wall .center{position:absolute;left:0;right:0;top:600px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 96px;}

  .wall .bolt{width:150px;margin-bottom:64px;}
  .wall .bolt img{width:100%;display:block;filter:drop-shadow(0 20px 36px rgba(255,82,82,0.40));}

  .wall .eyebrow{font-family:var(--body);font-weight:700;font-size:34px;letter-spacing:0.30em;text-transform:uppercase;color:#9fb2da;margin-bottom:56px;}

  .wall h1{margin:0;font-family:var(--display);font-weight:900;letter-spacing:-0.035em;line-height:0.90;text-transform:uppercase;}
  .wall h1 .l{display:block;color:#fff;font-size:150px;}
  .wall h1 .small{display:block;color:#9fb2da;font-size:96px;letter-spacing:-0.02em;margin-top:30px;}
  .wall h1 .punch{display:block;color:var(--coral);font-size:118px;letter-spacing:-0.045em;margin-top:18px;
    text-shadow:0 18px 44px rgba(255,82,82,0.35);}

  .wall .bang{margin-top:48px;font-family:var(--display);font-weight:900;font-size:160px;line-height:1;color:var(--coral);}

  .wall .bottom{position:absolute;left:0;right:0;bottom:300px;display:flex;flex-direction:column;align-items:center;gap:30px;}
  .wall .bottom .name{font-family:var(--display);font-weight:700;font-size:50px;letter-spacing:-0.01em;color:#fff;}
  .wall .bottom .logo{height:48px;opacity:0.85;}
</style>
</head>
<body>
<div class="artboard wall" data-screen-label="Wallpaper iPhone trompettistes">
  <div class="wm"><img src="../assets/bolt-white.png" alt=""></div>

  <div class="center">
    <div class="bolt"><img src="../assets/bolt-coral.png" alt=""></div>
    <div class="eyebrow">Surtout Serious</div>
    <h1>
      <span class="l">On va pas</span>
      <span class="l">se faire</span>
      <span class="l">avoir</span>
      <span class="small">par les</span>
      <span class="punch">Trompettistes</span>
    </h1>
    <div class="bang">!</div>
  </div>

  <div class="bottom">
    <div class="name">Charles-Éric · N°4</div>
    <img class="logo" src="../assets/logo-bump-white.png" alt="bump">
  </div>
</div>
</body>
</html>
