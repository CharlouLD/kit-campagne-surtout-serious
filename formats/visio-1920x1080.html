<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Fond visio — Surtout Serious</title>
<link rel="stylesheet" href="../styles/campaign.css">
<style>
  html,body{background:#11203a;}
  .visio{
    width:1920px;height:1080px;color:var(--white);
    background:
      radial-gradient(90% 90% at 88% 12%, rgba(255,82,82,0.20) 0%, rgba(255,82,82,0) 48%),
      linear-gradient(150deg, #173B7E 0%, #15326A 46%, #16263F 100%);
  }
  /* coral angled panel behind portrait (campaign sash) */
  .visio .sash{position:absolute;top:0;bottom:0;right:0;width:760px;
    background:linear-gradient(180deg,#FF5252 0%,#F03A3A 100%);
    clip-path:polygon(170px 0, 100% 0, 100% 100%, 0 100%);}
  .visio .wm{position:absolute;top:120px;left:120px;width:760px;opacity:0.06;transform:rotate(-8deg);}
  .visio .wm img{width:100%;display:block;}

  .visio .logo{position:absolute;top:74px;left:120px;height:62px;}
  .visio .copy{position:absolute;left:120px;top:300px;max-width:1000px;}
  .visio .kick{display:flex;align-items:center;gap:18px;margin-bottom:34px;}
  .visio .kick img{height:46px;display:block;}
  .visio .kick span{font-family:var(--body);font-weight:700;font-size:30px;letter-spacing:0.16em;text-transform:uppercase;color:var(--coral);}
  .visio h1{margin:0;font-family:var(--display);font-weight:900;letter-spacing:-0.035em;line-height:0.9;font-size:172px;color:#fff;}
  .visio h1 .em{color:var(--coral);display:block;}
  .visio .sub{margin-top:30px;font-family:var(--display);font-weight:500;font-size:52px;color:#dbe4f7;letter-spacing:-0.01em;}

  .visio .portrait{position:absolute;right:-70px;bottom:0;width:1120px;
    filter:drop-shadow(0 30px 50px rgba(8,18,40,0.45));}
  .visio .portrait img{width:100%;display:block;}
  .visio .foot{position:absolute;left:120px;bottom:64px;font-family:var(--body);font-weight:600;font-size:26px;letter-spacing:0.04em;color:#9fb2da;}
</style>
</head>
<body>
<div class="artboard visio" data-screen-label="Fond visio">
  <div class="sash"></div>
  <div class="wm"><img src="../assets/bolt-white.png" alt=""></div>
  <img class="logo" src="../assets/logo-bump-white.png" alt="bump">

  <div class="copy">
    <div class="kick"><img src="../assets/bolt-coral.png" alt=""><span>Le mandat numéro quatre</span></div>
    <h1 class="slogan">Surtout<span class="em">Serious.</span></h1>
    <div class="sub">Jamais à plat.</div>
  </div>

  <div class="portrait"><img src="../assets/portrait-cutout.png" alt="Charles-Éric"></div>
  <div class="foot">Charles-Éric · Candidat sortant · Award Fun&nbsp;&amp;&nbsp;Serious 2026</div>
</div>
</body>
</html>
