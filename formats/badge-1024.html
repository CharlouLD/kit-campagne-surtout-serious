<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Badge — Je vote Charles-Éric</title>
<link rel="stylesheet" href="../styles/campaign.css">
<style>
  html,body{background:transparent;}
  .badge{width:1024px;height:1024px;}
  .disc{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(70% 70% at 50% 36%, #1d4a8f 0%, #163A77 45%, #142A52 100%);
    border:30px solid var(--coral);
    box-shadow:0 24px 60px rgba(8,18,40,0.4);}
  .ring2{position:absolute;inset:64px;border-radius:50%;border:4px solid rgba(255,82,82,0.55);}
  .arcs{position:absolute;inset:0;}
  .arcs text{font-family:var(--body);font-weight:700;fill:#cdd9f4;letter-spacing:0.04em;}
  .arcs .top{font-family:var(--display);font-weight:900;fill:#fff;font-size:96px;letter-spacing:0.02em;}
  .arcs .bot{font-size:42px;letter-spacing:0.34em;fill:var(--coral);text-transform:uppercase;}

  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .center .bolt{width:150px;margin-bottom:18px;}
  .center .bolt img{width:100%;display:block;filter:drop-shadow(0 12px 22px rgba(255,82,82,0.4));}
  .center .name{font-family:var(--display);font-weight:900;letter-spacing:-0.03em;color:#fff;font-size:104px;line-height:0.9;}
  .center .tag{margin-top:26px;font-family:var(--body);font-weight:600;font-size:34px;letter-spacing:0.14em;text-transform:uppercase;color:#9fb2da;}
  .center .pill{margin-top:30px;font-family:var(--display);font-weight:900;font-size:46px;color:var(--coral);
    border:4px solid var(--coral);border-radius:999px;padding:8px 38px;}
</style>
</head>
<body>
<div class="artboard badge" data-screen-label="Badge rond">
  <div class="disc"></div>
  <div class="ring2"></div>

  <svg class="arcs" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
      <path id="topArc" d="M 512,512 m -372,0 a 372,372 0 1,1 744,0"></path>
      <path id="botArc" d="M 156,512 A 356,356 0 0,0 868,512"></path>
    </defs>
    <text class="top"><textPath href="#topArc" startOffset="50%" text-anchor="middle">JE VOTE</textPath></text>
    <text class="bot"><textPath href="#botArc" startOffset="50%" text-anchor="middle">Award Fun &amp; Serious · 2026</textPath></text>
  </svg>

  <div class="center">
    <div class="bolt"><img src="../assets/bolt-coral.png" alt=""></div>
    <div class="name">Charles-Éric</div>
    <div class="tag">Surtout Serious</div>
    <div class="pill">N°4</div>
  </div>
</div>
</body>
</html>
